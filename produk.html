<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sejuk Dekorasi - Produk</title>
  <link rel="stylesheet" href="asset/style.css" />
</head>
<body>
<header class="topbar">
<div id="sidebar" class="sidebar">
  <a href="index.html">Beranda</a>
  <a href="produk.html">Produk</a>
  <a href="index/kontak.html">Kontak</a>
  <a href="index/tentang.html">Tentang</a>
</div>
  <button class="burger" onclick="toggleMenu()">☰</button>

  <div class="top-row">
    <div class="brand">
      <img src="asset/logo (1).png">
      <span>Sejuk Dekorasi</span>
    </div>
  </div>

</header>
  <!-- SIDEBAR -->
  

  <main class="container">
   <H1>ㅤ</H1>
  <h1>Produk</h1>

    <div class="controls">
      <input id="searchBox" class="control-input" placeholder="Cari produk (nama atau kode)..." />

      <select id="categoryFilter" class="control-select">
        <option value="">Semua Kategori</option>
        <option value="pernikahan">Pernikahan</option>
         <option value="aqiqah">Aqiqah</option>
         <option value="akad">Akad Nikah</option>
         <option value="lamaran">Lamaran</option>
         <option value="acara">Acara</option>
          <option value="khitan">Khitan</option>
        <option value="ultah">Ulang Tahun</option>
        <option value="tasyakuran">Tasyakuran</option>
        <option value="lainnya">Lainnya</option>
      </select>
      <select id="sortPrice" class="control-select">
  <option value="">Urutkan Harga</option>
  <option value="asc">💸 Harga Terendah</option>
  <option value="desc">💎 Harga Tertinggi</option>
</select>
<h1>Produk</h1>
<div class="quick-category">
  <button data-kat="">Semua</button>
  <button data-kat="pernikahan">💍 Pernikahan</button>
  <button data-kat="akad">🤍 Akad</button>
  <button data-kat="lamaran">💌 Lamaran</button>
    <button data-kat="acara">✨ Acara</button>
  <button data-kat="ultah">🎉 Ulang Tahun</button>
  <button data-kat="khitan">🧒 Khitan</button>
</div>

      <div class="controls-actions">
        <button id="clearFilters" class="btn ghost">Reset</button>
      </div>
    </div>

    <div id="produkGrid" class="grid">
      <!-- diisi oleh app.js -->
    </div>
  </main>

  <footer class="footer">
    <small>© 2025 Sejuk Dekorasi — rrq onik hann#1945</small>
  </footer>

  <script src="js/app.js"></script>
  <script>
  

document.addEventListener("DOMContentLoaded", () => {

  // ===== QUICK CATEGORY =====
  document.querySelectorAll(".quick-category button").forEach(btn => {
    btn.addEventListener("click", () => {

      // hapus active semua
      document.querySelectorAll(".quick-category button")
        .forEach(b => b.classList.remove("active"));

      // aktifkan yang diklik
      btn.classList.add("active");

      // ambil kategori
      const kat = btn.dataset.kat.toLowerCase();

      // set ke dropdown
      document.getElementById("categoryFilter").value = kat;

      // render ulang
      renderProducts();
    });
  });

});

    // DOM references
    const searchBox = document.getElementById('searchBox');
const categoryFilter = document.getElementById('categoryFilter');
const sortPrice = document.getElementById('sortPrice');
const clearBtn = document.getElementById('clearFilters');
    // bind events
    searchBox.addEventListener('input', ()=> renderProducts());
    categoryFilter.addEventListener('change', ()=> renderProducts());
    sortPrice.addEventListener('change', () => renderProducts());

   clearBtn.addEventListener('click', ()=>{
  searchBox.value = '';
  categoryFilter.value = '';
  sortPrice.value = '';

  document.querySelectorAll(".quick-category button")
    .forEach(b => b.classList.remove("active"));

  document.querySelector('.quick-category button[data-kat=""]')
    .classList.add("active");

  renderProducts();
});

    // prefill search if ada ?search=...
    const urlQ = new URLSearchParams(window.location.search).get('search');
    if(urlQ){
      searchBox.value = urlQ;
    }

    // initial render
    document.addEventListener('DOMContentLoaded', ()=> {
      renderProducts();
    });
    function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");}
  </script>
</body>
